name: CI - Build, Scan, Push, Update Manifests

on:
  push:
    branches: ["**"]
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/ci.yml"

env:
  IMAGE_NAME: abdell001/payday-finance

jobs:
  build_scan_and_deploy:
    runs-on: ubuntu-latest
    name: Build, Scan, and Deploy
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ env.IMAGE_TAG }} ./app

      - name: Install and Run Trivy Scan
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
          trivy image --exit-code 0 --severity CRITICAL,HIGH --ignore-unfixed ${{ env.IMAGE_TAG }}

      - name: Push Image to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Update Dev Manifest
        if: github.ref == 'refs/heads/develop'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Abdell001/payday-fintech-platform.git
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_TAG }}|g" k8s/dev/manifests.yaml
          git add k8s/dev/manifests.yaml
          git commit -m "ci: update dev image tag to ${{ github.sha }}" || echo "No changes"
          git push origin develop

      - name: Update Prod Manifest
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Abdell001/payday-fintech-platform.git
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_TAG }}|g" k8s/production/manifests.yaml
          git add k8s/production/manifests.yaml
          git commit -m "ci: update prod image tag to ${{ github.sha }}" || echo "No changes"
          git push origin main
