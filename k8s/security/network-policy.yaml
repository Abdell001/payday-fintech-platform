apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: payday-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-ingress
  namespace: payday-prod
spec:
  podSelector:
    matchLabels:
      app: payday-app
  ingress:
  - ports:
    - port: 80
  egress:
  - ports:
    - port: 53
      protocol: UDP
